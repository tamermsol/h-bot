workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.mb.hbot"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "BQW2TW5473"
        APP_STORE_CONNECT_ISSUER_ID: "69a6de8f-0bee-47e3-e053-5b8c7c11a4d1"
      flutter: 3.29.2
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY
      - name: Set up signing
        script: |
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter packages
        script: |
          flutter pub get
      - name: Build IPA
        script: |
          flutter build ipa --release --no-tree-shake-icons --export-options-plist=/Users/builder/export_options.plist
      - name: Upload to TestFlight
        script: |
          app-store-connect publish \
            --path build/ios/ipa/*.ipa
    artifacts:
      - build/ios/ipa/*.ipa

  android-release:
    name: Android APK
    instance_type: mac_mini_m2
    max_build_duration: 20
    environment:
      flutter: 3.29.2
    scripts:
      - name: Flutter packages
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
